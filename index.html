<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MusicPlayer Pro</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #000;
    color: #fff;
    overflow-x: hidden;
  }
  
  /* Video de fondo cinematográfico */
  .video-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: -1;
    opacity: 0.4;
  }
  
  /* Navbar tipo Reels */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(20px);
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 100;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  nav h1 { font-size: 20px; font-weight: 700; }
  nav .menu { font-size: 24px; cursor: pointer; }
  
  /* Contenedor principal */
  .container {
    padding: 100px 20px 40px;
    max-width: 500px;
    margin: 0 auto;
  }
  
  /* Card de subida */
  .upload-card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 30px;
    margin-bottom: 30px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .upload-card h2 { margin-bottom: 20px; font-size: 18px; }
  input[type="file"] {
    width: 100%;
    padding: 15px;
    background: rgba(0,0,0,0.5);
    border: 2px dashed rgba(255,255,255,0.3);
    border-radius: 12px;
    color: #fff;
    cursor: pointer;
  }
  button {
    width: 100%;
    padding: 15px;
    margin-top: 15px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    transition: transform 0.2s;
  }
  button:active { transform: scale(0.98); }
  
  /* Lista de canciones estilo Reels */
  .cancion {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 15px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .cancion-nombre {
    font-weight: 600;
    margin-bottom: 10px;
    font-size: 15px;
  }
  audio {
    width: 100%;
    height: 40px;
  }
  audio::-webkit-media-controls-panel {
    background: rgba(0,0,0,0.5);
  }
  
  #mensaje { 
    text-align: center; 
    margin-top: 15px; 
    font-size: 14px;
    color: #4ade80;
  }
</style>
</head>
<body>

<video class="video-bg" autoplay muted loop playsinline>
  <source src="https://cdn.coverr.co/videos/coverr-waves-in-the-water-1080p-3622.mp4" type="video/mp4">
</video>

<nav>
  <h1>🎵 MusicPlayer</h1>
  <div class="menu">⋮</div>
</nav>

<div class="container">
  <div class="upload-card">
    <h2>Sube tu música</h2>
    <form id="uploadForm">
      <input type="file" name="archivo" accept="audio/*" required>
      <button type="submit">Subir Canción</button>
    </form>
    <div id="mensaje"></div>
  </div>
  
  <h2 style="margin-bottom: 20px;">Tu Biblioteca</h2>
  <div id="lista"></div>
</div>

<script>
const form = document.getElementById('uploadForm');
const mensaje = document.getElementById('mensaje');
const lista = document.getElementById('lista');

// Subir canción
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const formData = new FormData(form);
  mensaje.textContent = 'Subiendo...';
  
  try {
    const res = await fetch('/upload', {method: 'POST', body: formData});
    const data = await res.json();
    if (data.success) {
      mensaje.textContent = '✅ Subida correctamente';
      form.reset();
      cargarCanciones();
    }
  } catch (err) {
    mensaje.textContent = '❌ Error al subir';
  }
});

// Cargar canciones
async function cargarCanciones() {
  const res = await fetch('/api/canciones');
  const canciones = await res.json();
  
  if (canciones.length === 0) {
    lista.innerHTML = '<p style="opacity:0.5;text-align:center;">No hay canciones aún. Sube la primera 👆</p>';
    return;
  }
  
  lista.innerHTML = canciones.map(c => `
    <div class="cancion">
      <div class="cancion-nombre">🎵 ${c}</div>
      <audio controls src="/uploads/${c}"></audio>
    </div>
  `).join('');
}

cargarCanciones();
</script>

</body>
</html>
